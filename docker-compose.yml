version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: stockiq_db
    environment:
      POSTGRES_USER: stockiq
      POSTGRES_PASSWORD: stockiq123
      POSTGRES_DB: stockiq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockiq -d stockiq_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockiq_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stockiq:stockiq123@postgres:5432/stockiq_db
      SECRET_KEY: stockiq-super-secret-jwt-key-2024-diploma-thesis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockiq_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
